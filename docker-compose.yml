services:
  db:
    image: postgres:17-alpine
    container_name: issue-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: issue_tracker_api
    ports:
      - '5432:5432'
    volumes:
      - issue_tracker_pgdata:/var/lib/postgresql/data

volumes:
  issue_tracker_pgdata:
